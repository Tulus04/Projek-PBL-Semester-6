# MyPresensi PBL — Continuous Integration
#
# Tujuan: validasi setiap push/PR ke main supaya regresi (typescript error,
# lint error, flutter analyze issue) ketahuan otomatis sebelum merge.
#
# Job ringan dipisah supaya cepat fail-fast: type-check + lint dulu, build
# dipisah ke job terpisah karena lebih lama.
#
# Catatan: smoke test (npm run test:smoke) TIDAK dijalankan di CI karena
# butuh dev server live + Supabase credentials + sesi aktif di DB. Smoke
# test adalah manual gate sebelum merge fitur baru — lihat
# .windsurf/workflows/pre-commit-check.md.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel run lama kalau ada commit baru di branch yang sama (hemat menit CI)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-quality:
    name: Web — type-check + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mypresensi-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mypresensi-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

  web-build:
    name: Web — build
    runs-on: ubuntu-latest
    needs: web-quality
    defaults:
      run:
        working-directory: mypresensi-web
    env:
      # Build Next.js butuh env Supabase. Pakai placeholder agar tidak fail
      # di static analysis. RUNTIME tidak terpengaruh karena CI tidak deploy.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mypresensi-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Next.js build
        run: npm run build

  mobile-analyze:
    name: Mobile — flutter analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mypresensi-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pin minor agar konsisten antar lokal & CI. Dart SDK ^3.11.4 (lihat pubspec.yaml)
          # tersedia di Flutter 3.41.x. Update versi ini saat upgrade Flutter di lokal.
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze (fatal-infos)
        run: flutter analyze --fatal-infos
